name: Build Windows Executable

on:
  push:
    tags:
      - "v*"
    branches:
      - "claude/*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller `
            --onedir `
            --windowed `
            --add-data "src/core;core" `
            --collect-all ortools `
            --hidden-import http.server `
            --hidden-import webbrowser `
            --name "DeliveryRouteOptimizer" `
            src/app.py

      - name: Verify build output
        run: dir dist\DeliveryRouteOptimizer

      - name: Package dist folder as zip
        run: |
          Compress-Archive `
            -Path "dist\DeliveryRouteOptimizer" `
            -DestinationPath "dist\route-optimizer.zip"

      - name: Create GitHub Release and upload zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "배송경로자동정리 ${{ github.ref_name }}"
          body: |
            ## 배송 경로 자동 정리 프로그램 ${{ github.ref_name }}

            ### 다운로드 및 실행 방법
            1. 아래 **Assets** 에서 `route-optimizer.zip` 다운로드
            2. 압축 해제 → `DeliveryRouteOptimizer` 폴더 안의 `DeliveryRouteOptimizer.exe` 실행
            3. Python 설치 불필요

            ### 시스템 요구 사항
            - Windows 10 / 11 (64-bit)
            - 인터넷 연결 필수 (카카오 API 사용)
          files: dist/route-optimizer.zip
          draft: false
          prerelease: false
